name: Website Notification Tracker

on:
  schedule:
    # Runs roughly every 5 minutes. GitHub may delay scheduled runs by a
    # few minutes during periods of high load - this is a GitHub limitation,
    # not something the script can fix.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # allows manual "Run workflow" button for testing

permissions:
  contents: write   # needed so the workflow can commit the updated state.json

concurrency:
  group: notification-tracker
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python notification_tracker.py

      - name: Commit updated state (if changed)
        run: |
          git config user.name "notification-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update tracker state"
          git push
